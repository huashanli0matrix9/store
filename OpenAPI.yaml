openapi: 3.0.3
info:
  title: Store API
  version: "1.0.0"
  description: Customer, order, and product management API.
servers:
  - url: http://localhost:8080
paths:
  /customer:
    get:
      summary: List customers (paginated)
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: Paginated customer summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageCustomerSummaryResponse'
    post:
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Created customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /order:
    get:
      summary: List orders (paginated)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: Paginated order summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageOrderSummaryResponse'
    post:
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: Validation or bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /order/{id}:
    get:
      summary: Get order detail by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /products:
    get:
      summary: List products (paginated)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
      responses:
        '200':
          description: Paginated product summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageProductSummaryResponse'
    post:
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Created product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  /products/{id}:
    get:
      summary: Get product detail by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

components:
  parameters:
    page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
      description: 'Sort format: field,(asc|desc)'

  schemas:
    CreateCustomerRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
          example: John Doe

    CreateProductRequest:
      type: object
      required: [description]
      properties:
        description:
          type: string
          maxLength: 255
          example: Mechanical Keyboard

    CreateOrderRequest:
      type: object
      required: [description, customerId, productIds]
      properties:
        description:
          type: string
          maxLength: 255
          example: Office setup order
        customerId:
          type: integer
          format: int64
          example: 1
        productIds:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: integer
            format: int64
          example: [1, 2]

    CustomerSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    OrderSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string

    ProductSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string

    OrderCustomerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    CustomerOrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string

    CustomerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        orders:
          type: array
          items:
            $ref: '#/components/schemas/CustomerOrderResponse'

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        customer:
          $ref: '#/components/schemas/OrderCustomerResponse'
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummaryResponse'

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        description:
          type: string
        orderIds:
          type: array
          items:
            type: integer
            format: int64

    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        code:
          type: string
        message:
          type: string
          example: An unexpected error occurred
        path:
          type: string
        details:
          type: object
          additionalProperties:
            type: string

    PageCustomerSummaryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CustomerSummaryResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer
        first:
          type: boolean
        last:
          type: boolean

    PageOrderSummaryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummaryResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer
        first:
          type: boolean
        last:
          type: boolean

    PageProductSummaryResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummaryResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer
        first:
          type: boolean
        last:
          type: boolean
